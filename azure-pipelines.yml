trigger:
- main

resources:
- repo: self

variables:
  # The name of your Azure Resource Manager service connection
  azureServiceConnection: 'KernerNorland-Azure-PAYG(8eb5353d-d0b5-4279-b9e5-3d1a611bc581)'
  imageRepository: 'madhukadtestrepoazuredevops'
  containerRegistry: 'testserverapp' # Just the registry name, not the full .azurecr.io URL
  dockerfilePath: 'Dockerfile'
  tag: '$(Build.BuildId)'
  vmImageName: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build via ACR Tasks
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: AzureCLI@2
      displayName: 'Build and Push via ACR Tasks'
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          az acr build \
            --registry $(containerRegistry) \
            --image $(imageRepository):$(tag) \
            --file $(dockerfilePath) .